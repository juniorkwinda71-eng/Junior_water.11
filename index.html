<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Junior K Arena_11</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --neon:#00f5ff;--neon2:#ff00ff;--gold:#ffd700;--red:#ff3333;--green:#00ff88;
  --dark:#060612;--dark2:#0d0d2b;--card:#111130;--card2:#1a1a3e;
  --text:#e0e0ff;--sub:#8888aa;
}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',sans-serif;background:var(--dark);color:var(--text);}
canvas{display:none;position:absolute;top:0;left:0;}

/* SCREENS */
.screen{display:none;position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;}
.screen.active{display:flex;flex-direction:column;}

/* PARTICLES BG */
#bg{position:fixed;inset:0;z-index:-1;}

/* ===== MAIN MENU ===== */
#menuScreen{align-items:center;justify-content:center;gap:16px;padding:20px;}
.logo-wrap{text-align:center;margin-bottom:8px;}
.logo-title{font-size:clamp(28px,7vw,52px);font-weight:900;letter-spacing:2px;
  background:linear-gradient(90deg,var(--neon),var(--neon2),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-shadow:none;filter:drop-shadow(0 0 12px #00f5ff88);}
.logo-sub{font-size:clamp(11px,3vw,16px);color:var(--sub);letter-spacing:4px;margin-top:4px;}
.menu-btn{width:min(340px,90vw);padding:14px 20px;border:none;border-radius:12px;
  font-size:clamp(14px,3.5vw,18px);font-weight:700;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;gap:12px;justify-content:center;letter-spacing:1px;}
.btn-play{background:linear-gradient(135deg,#00c8ff,#7b2fff);color:#fff;}
.btn-play:hover{transform:scale(1.04);box-shadow:0 0 24px #00c8ff88;}
.btn-modes{background:linear-gradient(135deg,#ff6b00,#ff2d78);color:#fff;}
.btn-modes:hover{transform:scale(1.04);box-shadow:0 0 24px #ff6b0088;}
.btn-profile{background:var(--card2);color:var(--neon);border:1px solid var(--neon);}
.btn-profile:hover{background:var(--neon);color:#000;}
.btn-lb{background:var(--card2);color:var(--gold);border:1px solid var(--gold);}
.btn-lb:hover{background:var(--gold);color:#000;}
.menu-footer{font-size:11px;color:var(--sub);margin-top:8px;}

/* ===== LOBBY ===== */
#lobbyScreen{padding:16px;gap:12px;align-items:center;}
.page-title{font-size:clamp(18px,5vw,28px);font-weight:800;color:var(--neon);
  text-align:center;letter-spacing:2px;margin-bottom:4px;}
.room-box{background:var(--card);border:1px solid var(--neon);border-radius:14px;
  padding:16px;width:min(400px,95vw);text-align:center;}
.room-code{font-size:clamp(28px,8vw,48px);font-weight:900;color:var(--gold);letter-spacing:8px;
  font-family:monospace;}
.room-label{font-size:12px;color:var(--sub);margin-bottom:8px;}
.players-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:min(400px,95vw);}
.player-slot{background:var(--card);border:1px solid #333355;border-radius:12px;
  padding:12px;text-align:center;min-height:80px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:6px;transition:all .3s;}
.player-slot.filled{border-color:var(--neon);background:var(--card2);}
.player-slot.you{border-color:var(--gold);}
.slot-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:20px;background:linear-gradient(135deg,#7b2fff,#00c8ff);}
.slot-name{font-size:13px;font-weight:700;}
.slot-empty{color:var(--sub);font-size:12px;}
.slot-badge{font-size:10px;padding:2px 8px;border-radius:20px;background:#ffffff22;color:var(--gold);}
.mode-selector{width:min(400px,95vw);}
.mode-selector-title{font-size:13px;color:var(--sub);margin-bottom:8px;}
.mode-chips{display:flex;flex-wrap:wrap;gap:8px;}
.mode-chip{padding:8px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;
  border:1px solid #333355;background:var(--card);color:var(--sub);transition:all .2s;}
.mode-chip.selected{border-color:var(--neon);color:var(--neon);background:#00f5ff11;}
.mode-chip.locked{opacity:.4;cursor:not-allowed;}
.lobby-actions{display:flex;gap:10px;width:min(400px,95vw);}
.action-btn{flex:1;padding:13px;border:none;border-radius:12px;font-size:14px;font-weight:700;
  cursor:pointer;transition:all .2s;}
.btn-start{background:linear-gradient(135deg,var(--green),#009955);color:#000;}
.btn-back{background:var(--card2);color:var(--sub);border:1px solid #333355;}
.btn-start:hover{transform:scale(1.03);box-shadow:0 0 20px #00ff8844;}

/* ===== MODES GALLERY ===== */
#modesScreen{padding:16px;gap:12px;align-items:center;}
.modes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(160px,42vw),1fr));
  gap:12px;width:min(600px,95vw);}
.mode-card{background:var(--card);border:1px solid #222244;border-radius:16px;
  padding:16px 12px;text-align:center;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;}
.mode-card:not(.locked-card):hover{transform:translateY(-4px);border-color:var(--neon);
  box-shadow:0 8px 32px #00f5ff22;}
.mode-card.locked-card{opacity:.55;cursor:not-allowed;}
.mode-icon{font-size:36px;margin-bottom:8px;}
.mode-name{font-size:13px;font-weight:800;margin-bottom:4px;}
.mode-desc{font-size:11px;color:var(--sub);line-height:1.4;}
.coming-badge{position:absolute;top:10px;right:-18px;background:var(--red);color:#fff;
  font-size:9px;font-weight:900;padding:3px 24px;transform:rotate(35deg);letter-spacing:1px;}
.mode-players{font-size:10px;color:var(--neon);margin-top:6px;}

/* ===== PROFILE ===== */
#profileScreen{padding:16px;gap:14px;align-items:center;}
.profile-card{background:var(--card);border:1px solid var(--neon);border-radius:20px;
  padding:20px;width:min(380px,95vw);text-align:center;}
.prof-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#7b2fff,#ff2d78);
  margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:36px;
  border:3px solid var(--gold);}
.prof-name{font-size:22px;font-weight:900;color:var(--gold);}
.prof-level{font-size:13px;color:var(--neon);margin-bottom:12px;}
.xp-bar-wrap{background:#ffffff11;border-radius:20px;height:8px;margin:8px 0;}
.xp-bar{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--neon),var(--neon2));
  transition:width .5s;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px;}
.stat-item{background:var(--card2);border-radius:10px;padding:10px 4px;}
.stat-val{font-size:20px;font-weight:900;color:var(--gold);}
.stat-lbl{font-size:10px;color:var(--sub);}
.achievements{width:min(380px,95vw);}
.ach-title{font-size:14px;font-weight:700;color:var(--neon);margin-bottom:10px;}
.ach-item{background:var(--card);border-radius:10px;padding:10px 14px;margin-bottom:8px;
  display:flex;align-items:center;gap:12px;border:1px solid #222244;}
.ach-icon{font-size:24px;}
.ach-name{font-size:13px;font-weight:700;}
.ach-desc{font-size:11px;color:var(--sub);}

/* ===== LEADERBOARD ===== */
#lbScreen{padding:16px;gap:12px;align-items:center;}
.lb-list{width:min(400px,95vw);}
.lb-item{background:var(--card);border-radius:12px;padding:12px 16px;margin-bottom:8px;
  display:flex;align-items:center;gap:12px;border:1px solid #222244;transition:all .2s;}
.lb-item:hover{border-color:var(--neon);}
.lb-rank{font-size:20px;font-weight:900;width:32px;text-align:center;}
.rank-1{color:var(--gold);}
.rank-2{color:#c0c0c0;}
.rank-3{color:#cd7f32;}
.lb-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#7b2fff,#00c8ff);
  display:flex;align-items:center;justify-content:center;font-size:18px;}
.lb-info{flex:1;}
.lb-name{font-size:14px;font-weight:700;}
.lb-score{font-size:12px;color:var(--gold);}
.lb-pts{font-size:16px;font-weight:900;color:var(--neon);}

/* ===== GAME SCREENS ===== */
#gameScreen{background:#000;position:relative;}
#gameCanvas{display:block;width:100%;height:100%;}
.hud{position:absolute;top:0;left:0;right:0;padding:8px 12px;
  display:flex;justify-content:space-between;align-items:center;
  background:linear-gradient(180deg,#00000099,transparent);z-index:10;}
.hud-score{font-size:clamp(12px,3vw,16px);font-weight:700;color:var(--gold);}
.hud-mode{font-size:clamp(10px,2.5vw,13px);color:var(--neon);font-weight:700;}
.hud-timer{font-size:clamp(14px,4vw,22px);font-weight:900;color:var(--red);}
.hud-health{display:flex;gap:4px;align-items:center;}
.health-bar{width:80px;height:8px;background:#ffffff22;border-radius:4px;overflow:hidden;}
.health-fill{height:100%;background:var(--green);border-radius:4px;transition:width .3s;}

/* mobile controls */
.mobile-controls{position:absolute;bottom:0;left:0;right:0;padding:12px;
  display:flex;justify-content:space-between;align-items:flex-end;z-index:10;}
.dpad{display:grid;grid-template-columns:repeat(3,48px);grid-template-rows:repeat(3,48px);gap:4px;}
.dpad-btn{background:#ffffff18;border:1px solid #ffffff30;border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;
  -webkit-user-select:none;user-select:none;active:background:#ffffff33;}
.dpad-btn:active{background:#ffffff33;}
.action-btns{display:flex;flex-direction:column;gap:8px;}
.act-btn{width:56px;height:56px;border-radius:50%;border:none;font-size:18px;font-weight:900;
  cursor:pointer;-webkit-user-select:none;user-select:none;}
.btn-fire{background:linear-gradient(135deg,var(--red),#ff6600);}
.btn-special{background:linear-gradient(135deg,var(--neon2),#7b2fff);}

/* ===== QUIZ SCREEN ===== */
#quizScreen{padding:16px;gap:12px;align-items:center;background:var(--dark);}
.quiz-hud{width:min(500px,95vw);display:flex;justify-content:space-between;align-items:center;
  background:var(--card);border-radius:12px;padding:12px 16px;border:1px solid var(--neon);}
.quiz-question{background:var(--card);border:1px solid #333355;border-radius:16px;
  padding:20px;width:min(500px,95vw);font-size:clamp(14px,3.5vw,18px);font-weight:700;
  text-align:center;line-height:1.5;min-height:80px;display:flex;align-items:center;justify-content:center;}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:min(500px,95vw);}
.quiz-opt{padding:14px;border-radius:12px;border:2px solid #333355;background:var(--card);
  font-size:clamp(13px,3vw,15px);font-weight:700;cursor:pointer;transition:all .2s;text-align:center;}
.quiz-opt:hover:not(:disabled){border-color:var(--neon);background:#00f5ff11;}
.quiz-opt.correct{border-color:var(--green);background:#00ff8822;color:var(--green);}
.quiz-opt.wrong{border-color:var(--red);background:#ff333322;color:var(--red);}
.quiz-players{display:flex;gap:10px;width:min(500px,95vw);
